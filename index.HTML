<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hand-Controlled Particle System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #video-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 200px;
            height: 150px;
            border: 2px solid #00ffcc;
            border-radius: 10px;
            overflow: hidden;
            z-index: 10;
            transform: scaleX(-1); /* Mirror video */
        }
        #input_video { width: 100%; height: 100%; object-fit: cover; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffcc;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #00ffcc;
        }
        h1 { margin: 0 0 10px 0; font-size: 18px; text-transform: uppercase; }
        .instruction { font-size: 14px; line-height: 1.4; color: #fff; }
        .key { color: #ffff00; font-weight: bold; }
        #loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffcc;
            font-size: 24px;
            z-index: 20;
        }
    </style>
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loader">Initializing AI Vision...</div>

    <div id="ui">
        <h1>Particle Core</h1>
        <div class="instruction"><span class="key">1 Finger:</span> Heart</div>
        <div class="instruction"><span class="key">2 Fingers:</span> Saturn</div>
        <div class="instruction"><span class="key">3 Fingers:</span> Flower</div>
        <div class="instruction"><span class="key">4 Fingers:</span> DNA Helix</div>
        <div class="instruction"><span class="key">Open Hand:</span> Sphere</div>
        <div class="instruction"><br>Move Hand X: Change Color</div>
    </div>

    <div id="video-container">
        <video id="input_video" autoplay playsinline></video>
    </div>

    <script>
        // --- CONFIGURATION ---
        const PARTICLE_COUNT = 15000;
        const PARTICLE_SIZE = 0.08;
        const LERP_SPEED = 0.08; // How fast particles fly to new shapes

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        // Add subtle fog for depth
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 8;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- PARTICLE SYSTEM ---
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3); // Where particles want to go

        // Initialize random positions
        for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 20;
            targetPositions[i] = positions[i];
            colors[i] = 1.0;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // Shader-like material using standard PointsMaterial with vertex colors
        const material = new THREE.PointsMaterial({
            size: PARTICLE_SIZE,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.8
        });

        // Texture for particle glow
        const sprite = new THREE.TextureLoader().load('https://threejs.org/examples/textures/sprites/disc.png');
        material.map = sprite;

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- SHAPE GENERATORS ---
        
        // Helper: Convert spherical to cartesian
        function getSpherePoint(r) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            return {
                x: r * Math.sin(phi) * Math.cos(theta),
                y: r * Math.sin(phi) * Math.sin(theta),
                z: r * Math.cos(phi)
            };
        }

        const shapes = {
            // 0: Collapsed / Black Hole
            fist: (i) => { return {x:0, y:0, z:0} },

            // 1 Finger: Heart
            heart: (i) => {
                // Heart curve formula
                const t = Math.random() * Math.PI * 2;
                // Spread particles inside the volume
                const r = Math.sqrt(Math.random()); 
                // Parametric equations stretched for 3D volume
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                let z = (Math.random() - 0.5) * 4; // Thickness
                
                const scale = 0.15 * r;
                return { x: x * scale, y: y * scale, z: z };
            },

            // 2 Fingers: Saturn
            saturn: (i) => {
                const ratio = i / PARTICLE_COUNT;
                if (ratio < 0.7) {
                    // Planet
                    return getSpherePoint(2.5);
                } else {
                    // Ring
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 4 + Math.random() * 2;
                    return {
                        x: Math.cos(angle) * radius,
                        y: (Math.random() - 0.5) * 0.2, // Flat
                        z: Math.sin(angle) * radius
                    };
                }
            },

            // 3 Fingers: Flower
            flower: (i) => {
                const u = Math.random() * Math.PI * 2;
                const v = Math.random() * Math.PI;
                // Rose-like variance
                const r = 3 + Math.sin(5 * u) * Math.sin(4 * v); 
                return {
                    x: r * Math.sin(v) * Math.cos(u),
                    y: r * Math.sin(v) * Math.sin(u),
                    z: r * Math.cos(v)
                };
            },

            // 4 Fingers: DNA / Helix
            helix: (i) => {
                const angle = (i / PARTICLE_COUNT) * Math.PI * 20; // 10 turns
                const radius = 2.5;
                const height = 10;
                const y = (i / PARTICLE_COUNT - 0.5) * height;
                // Double helix offset
                const offset = (i % 2 === 0) ? 0 : Math.PI; 
                return {
                    x: Math.cos(angle + offset) * radius,
                    y: y,
                    z: Math.sin(angle + offset) * radius
                };
            },

            // 5 Fingers: Sphere
            sphere: (i) => {
                return getSpherePoint(4);
            }
        };

        let currentShape = 'sphere';
        let scaleFactor = 1;
        let rotationTarget = { x: 0, y: 0 };

        // --- UPDATE LOGIC ---
        function updateTargetShape(shapeName) {
            if (!shapes[shapeName]) return;
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const p = shapes[shapeName](i);
                const idx = i * 3;
                targetPositions[idx] = p.x;
                targetPositions[idx+1] = p.y;
                targetPositions[idx+2] = p.z;
            }
        }

        // Initial set
        updateTargetShape('sphere');

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            const positionsArray = particles.geometry.attributes.position.array;
            const colorsArray = particles.geometry.attributes.color.array;

            // Global Rotation based on hand tracking or auto-idle
            particles.rotation.y += 0.002 + (rotationTarget.x * 0.05);
            particles.rotation.x += (rotationTarget.y * 0.05);

            // Interpolate positions
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const idx = i * 3;
                
                // Retrieve target with scale applied
                const tx = targetPositions[idx] * scaleFactor;
                const ty = targetPositions[idx+1] * scaleFactor;
                const tz = targetPositions[idx+2] * scaleFactor;

                // Lerp current to target
                positionsArray[idx] += (tx - positionsArray[idx]) * LERP_SPEED;
                positionsArray[idx+1] += (ty - positionsArray[idx+1]) * LERP_SPEED;
                positionsArray[idx+2] += (tz - positionsArray[idx+2]) * LERP_SPEED;

                // Dynamic Jitter (simulates energy)
                if (currentShape !== 'fist') {
                    positionsArray[idx] += (Math.random() - 0.5) * 0.02;
                    positionsArray[idx+1] += (Math.random() - 0.5) * 0.02;
                    positionsArray[idx+2] += (Math.random() - 0.5) * 0.02;
                }
            }

            particles.geometry.attributes.position.needsUpdate = true;
            particles.geometry.attributes.color.needsUpdate = true;

            renderer.render(scene, camera);
        }

        animate();

        // --- MEDIAPIPE LOGIC ---
        const videoElement = document.getElementById('input_video');
        
        function onResults(results) {
            document.getElementById('loader').style.display = 'none';

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                // 1. COUNT FINGERS
                // Tips: 4 (Thumb), 8 (Index), 12 (Middle), 16 (Ring), 20 (Pinky)
                // PIPs (Knuckles): 2, 6, 10, 14, 18
                let fingerCount = 0;
                
                // Thumb is tricky, check x distance relative to wrist/knuckle
                // Simple logic: is tip to the right of knuckle (for right hand)
                // We'll use a simpler distance check to palm center for robustness
                const wrist = landmarks[0];
                
                const isExtended = (tipIdx, pipIdx) => {
                    // Check distance from wrist. If tip is further than pip, it's extended
                    const dTip = Math.hypot(landmarks[tipIdx].x - wrist.x, landmarks[tipIdx].y - wrist.y);
                    const dPip = Math.hypot(landmarks[pipIdx].x - wrist.x, landmarks[pipIdx].y - wrist.y);
                    return dTip > dPip;
                };

                // Thumb, Index, Middle, Ring, Pinky
                if (isExtended(4, 2)) fingerCount++;
                if (isExtended(8, 6)) fingerCount++;
                if (isExtended(12, 10)) fingerCount++;
                if (isExtended(16, 14)) fingerCount++;
                if (isExtended(20, 18)) fingerCount++;

                // 2. DETERMINE SHAPE FROM FINGER COUNT
                let newShape = currentShape;
                if (fingerCount === 0) newShape = 'fist';
                else if (fingerCount === 1) newShape = 'heart';
                else if (fingerCount === 2) newShape = 'saturn';
                else if (fingerCount === 3) newShape = 'flower';
                else if (fingerCount === 4) newShape = 'helix';
                else if (fingerCount >= 5) newShape = 'sphere';

                if (newShape !== currentShape) {
                    currentShape = newShape;
                    updateTargetShape(newShape);
                }

                // 3. COLOR CONTROL (Hand X Position)
                // Hand x is 0.0 (left) to 1.0 (right)
                const handX = landmarks[9].x; // Middle finger knuckle
                const hue = handX; // 0 to 1
                const colorObj = new THREE.Color();
                colorObj.setHSL(hue, 1.0, 0.5);

                // Update particle colors slowly
                const colorsArr = particles.geometry.attributes.color.array;
                for(let i=0; i<PARTICLE_COUNT; i++){
                    // Only update some particles per frame for "glitter" effect or all for solid change
                    // Let's do a gradient
                    colorsArr[i*3] = colorObj.r;
                    colorsArr[i*3+1] = colorObj.g;
                    colorsArr[i*3+2] = colorObj.b;
                }

                // 4. ROTATION CONTROL (Hand Y Position)
                // Hand Y 0 (top) to 1 (bottom)
                const handY = landmarks[9].y;
                rotationTarget.y = (handY - 0.5) * 2; // -1 to 1

                // 5. EXPANSION (Pinch Detection)
                // Distance between Thumb Tip (4) and Index Tip (8)
                const t = landmarks[4];
                const i = landmarks[8];
                const pinchDist = Math.hypot(t.x - i.x, t.y - i.y);
                
                // Map pinch: Close (~0.02) -> Small, Open (~0.2+) -> Large
                // Default scale is 1. If pinched, scale down. If wide, scale up.
                // However, finger counting interferes with pinch. 
                // Let's only apply Scale logic if we are in 'sphere' mode or generic pinch logic override.
                // Actually, let's map scale generally to hand spread or simple pinch.
                
                // Let's use the average distance of all fingertips from wrist (Hand Size)
                let avgDist = 0;
                [4,8,12,16,20].forEach(idx => {
                    avgDist += Math.hypot(landmarks[idx].x - wrist.x, landmarks[idx].y - wrist.y);
                });
                avgDist /= 5;
                
                // Base scale 1, modify by hand size
                // avgDist is usually 0.2 to 0.5
                scaleFactor = THREE.MathUtils.clamp(avgDist * 3, 0.5, 3.0);

            }
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 320,
            height: 240
        });

        cameraUtils.start();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
